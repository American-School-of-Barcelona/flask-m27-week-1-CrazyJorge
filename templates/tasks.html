<script>
    const colorWord = document.getElementById('colorWord');

    function changeTextColor() {
        if (!colorWord) return;
        // HSL: Hue (0-360) gives all colors, Saturation 100% = vibrant, Lightness 50% = mid-brightness
        const hue = Math.floor(Math.random() * 360);
        const randomColor = `hsl(${hue}, 100%, 50%)`;
        colorWord.style.color = randomColor;
    }

    setInterval(changeTextColor, 100);
</script>
